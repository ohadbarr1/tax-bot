# Firebase App Hosting configuration — https://firebase.google.com/docs/app-hosting
#
# Runtime settings for the Next.js server. Form-106 OCR (Tesseract Hebrew+English)
# and PDF text extraction can spike RAM and wall-clock on cold starts.
#
# Phase 2 §2.G capacity tuning:
#   • minInstances = 1 — keeps one warm pool member to absorb the cold-start
#     hit on the first request after idle. Bump to ≥ 2 from Feb 1 → May 31
#     (filing-season crunch) via a release-branch override.
#   • maxInstances = 30 — UPGRADE_PLAN crunch ceiling.
#   • concurrency  = 20 — Tesseract is CPU-bound; >20 in-flight per instance
#     causes head-of-line blocking on the OCR queue. Plan §2.G value.
#   • Splitting OCR/PDF into a separate Cloud Run service (UPGRADE_PLAN §2.G)
#     is deferred — single-service is fine until concurrent OCR > 60.

runConfig:
  cpu: 2
  memoryMiB: 2048
  concurrency: 20
  minInstances: 1
  maxInstances: 30
  timeoutSeconds: 300

# Environment variables.
#
# The NEXT_PUBLIC_FIREBASE_* block below hard-codes the public web config for
# the `taxbackil` Firebase project. These values are *not* secrets — they are
# shipped to the browser bundle at build time so the client SDK can connect to
# Auth/Firestore/Storage. Security is enforced by firestore.rules + storage.rules
# (scoped to request.auth.uid) and by Firebase Auth's "Authorized domains" list.
#
# True secrets (ANTHROPIC_API_KEY) must be stored via
#   firebase apphosting:secrets:set ANTHROPIC_API_KEY
# and referenced with `secret:` rather than `value:`.
env:
  - variable: NEXT_PUBLIC_FIREBASE_API_KEY
    value: AIzaSyBJhsxrgaw9ML_MaPQOsCr3zjOFTdOlfzs
    availability: [BUILD, RUNTIME]
  - variable: NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
    value: taxbackil.firebaseapp.com
    availability: [BUILD, RUNTIME]
  - variable: NEXT_PUBLIC_FIREBASE_PROJECT_ID
    value: taxbackil
    availability: [BUILD, RUNTIME]
  - variable: NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET
    value: taxbackil.firebasestorage.app
    availability: [BUILD, RUNTIME]
  - variable: NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID
    value: "335346608639"
    availability: [BUILD, RUNTIME]
  - variable: NEXT_PUBLIC_FIREBASE_APP_ID
    value: "1:335346608639:web:d1ba92ab74673c017e1fca"
    availability: [BUILD, RUNTIME]

  # ── Firebase App Check (security-F1.1.4 / F1.3.2) ────────────────────────
  # reCAPTCHA v3 site key — set later via:
  #   firebase apphosting:secrets:set NEXT_PUBLIC_RECAPTCHA_SITE_KEY
  # then uncomment the block below. Until set, App Check no-ops (per
  # lib/firebase/client.ts) and the build proceeds. App Hosting rejects
  # empty `value: ""` entries, so we omit rather than stub.
  # - variable: NEXT_PUBLIC_RECAPTCHA_SITE_KEY
  #   secret: NEXT_PUBLIC_RECAPTCHA_SITE_KEY
  #   availability: [BUILD, RUNTIME]

  # Anthropic API key — stored in Google Cloud Secret Manager. Set via:
  #   firebase apphosting:secrets:set ANTHROPIC_API_KEY
  # The runner service account is granted secretAccessor scoped to this one
  # secret. Only RUNTIME — the build step never sees the key.
  - variable: ANTHROPIC_API_KEY
    secret: ANTHROPIC_API_KEY
    availability: [RUNTIME]

  # ── Sentry (observability, closes audit performance §1.6) ───────────────
  # Provisioning required before uncommenting (App Hosting fails the BUILD
  # if a `secret:` reference can't resolve in Secret Manager). Run:
  #   firebase apphosting:secrets:set SENTRY_DSN
  #   firebase apphosting:secrets:set SENTRY_AUTH_TOKEN
  # then uncomment. Until then `lib/sentry.{server,client}.ts` no-op and
  # `withSentryConfig` is bypassed (next.config.ts gates on SENTRY_AUTH_TOKEN).
  # NEXT_PUBLIC_SENTRY_DSN should reference the same secret as SENTRY_DSN.
  # - variable: SENTRY_DSN
  #   secret: SENTRY_DSN
  #   availability: [RUNTIME]
  # - variable: NEXT_PUBLIC_SENTRY_DSN
  #   secret: SENTRY_DSN
  #   availability: [BUILD, RUNTIME]
  # - variable: SENTRY_AUTH_TOKEN
  #   secret: SENTRY_AUTH_TOKEN
  #   availability: [BUILD]

  # ── Upstash Redis (rate limiting, closes audit F-2 / F1.2.1) ─────────────
  # Same provisioning prerequisite. Run:
  #   firebase apphosting:secrets:set UPSTASH_REDIS_REST_URL
  #   firebase apphosting:secrets:set UPSTASH_REDIS_REST_TOKEN
  # then uncomment. Until then `lib/api/withRateLimit.ts` no-ops with a
  # console.warn — auth via withUser still gates every route, so the
  # cost-DoS surface is small but non-zero (an authenticated attacker can
  # still spam Anthropic). Treat provisioning as a launch-blocker.
  # - variable: UPSTASH_REDIS_REST_URL
  #   secret: UPSTASH_REDIS_REST_URL
  #   availability: [RUNTIME]
  # - variable: UPSTASH_REDIS_REST_TOKEN
  #   secret: UPSTASH_REDIS_REST_TOKEN
  #   availability: [RUNTIME]
