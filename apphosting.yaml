# Firebase App Hosting configuration — https://firebase.google.com/docs/app-hosting
#
# Runtime settings for the Next.js server. These caps stay generous because
# Form-106 OCR (Tesseract Hebrew+English) and PDF text extraction can spike
# RAM and wall-clock on cold starts. Adjust down once you profile real traffic.

runConfig:
  cpu: 2
  memoryMiB: 2048
  concurrency: 40
  minInstances: 0
  maxInstances: 10
  timeoutSeconds: 300

# Environment variables.
#
# The NEXT_PUBLIC_FIREBASE_* block below hard-codes the public web config for
# the `taxbackil` Firebase project. These values are *not* secrets — they are
# shipped to the browser bundle at build time so the client SDK can connect to
# Auth/Firestore/Storage. Security is enforced by firestore.rules + storage.rules
# (scoped to request.auth.uid) and by Firebase Auth's "Authorized domains" list.
#
# True secrets (ANTHROPIC_API_KEY) must be stored via
#   firebase apphosting:secrets:set ANTHROPIC_API_KEY
# and referenced with `secret:` rather than `value:`.
env:
  - variable: NEXT_PUBLIC_FIREBASE_API_KEY
    value: AIzaSyBJhsxrgaw9ML_MaPQOsCr3zjOFTdOlfzs
    availability: [BUILD, RUNTIME]
  - variable: NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
    value: taxbackil.firebaseapp.com
    availability: [BUILD, RUNTIME]
  - variable: NEXT_PUBLIC_FIREBASE_PROJECT_ID
    value: taxbackil
    availability: [BUILD, RUNTIME]
  - variable: NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET
    value: taxbackil.firebasestorage.app
    availability: [BUILD, RUNTIME]
  - variable: NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID
    value: "335346608639"
    availability: [BUILD, RUNTIME]
  - variable: NEXT_PUBLIC_FIREBASE_APP_ID
    value: "1:335346608639:web:d1ba92ab74673c017e1fca"
    availability: [BUILD, RUNTIME]

  # ── Firebase App Check (security-F1.1.4 / F1.3.2) ────────────────────────
  # reCAPTCHA v3 site key for the App Check provider. Public-by-design — the
  # key is embedded in the page anyway. Get one at
  #   https://www.google.com/recaptcha/admin/create
  # (type: reCAPTCHA v3, domains: <project>.web.app + your custom domain)
  # then register the same key in Firebase Console → App Check → reCAPTCHA v3.
  # See DEPLOY.md §App Check.
  - variable: NEXT_PUBLIC_RECAPTCHA_SITE_KEY
    value: ""
    availability: [BUILD, RUNTIME]

  # Anthropic API key — stored in Google Cloud Secret Manager. Set via:
  #   firebase apphosting:secrets:set ANTHROPIC_API_KEY
  # The runner service account is granted secretAccessor scoped to this one
  # secret. Only RUNTIME — the build step never sees the key.
  - variable: ANTHROPIC_API_KEY
    secret: ANTHROPIC_API_KEY
    availability: [RUNTIME]

  # ── Sentry (observability, closes audit performance §1.6) ───────────────
  # Stored in Google Cloud Secret Manager. Set via:
  #   firebase apphosting:secrets:set SENTRY_DSN
  #   firebase apphosting:secrets:set SENTRY_AUTH_TOKEN
  # SENTRY_DSN is read at runtime by `lib/sentry.server.ts` and
  # `lib/sentry.client.ts` (the latter via NEXT_PUBLIC_SENTRY_DSN — set both
  # to the same DSN value; only NEXT_PUBLIC_* is exposed to the browser
  # bundle). SENTRY_AUTH_TOKEN is used at BUILD time by `withSentryConfig`
  # to upload source maps; without it, the build still succeeds but client
  # stack traces in Sentry won't be symbolicated. See DEPLOY.md.
  - variable: SENTRY_DSN
    secret: SENTRY_DSN
    availability: [RUNTIME]
  - variable: NEXT_PUBLIC_SENTRY_DSN
    secret: SENTRY_DSN
    availability: [BUILD, RUNTIME]
  - variable: SENTRY_AUTH_TOKEN
    secret: SENTRY_AUTH_TOKEN
    availability: [BUILD]

  # ── Upstash Redis (rate limiting, closes audit F-2 / F1.2.1) ─────────────
  # Stored in Google Cloud Secret Manager. Set via:
  #   firebase apphosting:secrets:set UPSTASH_REDIS_REST_URL
  #   firebase apphosting:secrets:set UPSTASH_REDIS_REST_TOKEN
  # Both are RUNTIME-only — the build step never reads them. When unset,
  # `lib/api/withRateLimit.ts` falls back to a no-op + warning so dev/test
  # environments work without provisioning Upstash. See DEPLOY.md.
  - variable: UPSTASH_REDIS_REST_URL
    secret: UPSTASH_REDIS_REST_URL
    availability: [RUNTIME]
  - variable: UPSTASH_REDIS_REST_TOKEN
    secret: UPSTASH_REDIS_REST_TOKEN
    availability: [RUNTIME]
